		(u) => {
			let rect = u.over.getBoundingClientRect();
            u.over.addEventListener(
                "wheel",
                (e) => {
                    let oxRange = u.scales.x.max - u.scales.x.min;
                    let nxRange = e.deltaY < 0 ? oxRange * 0.95 : oxRange / 0.95;
                    let nxMin = u.posToVal(u.cursor.left, "x") - (u.cursor.left / rect.width) * nxRange;
                    if (nxMin < 0) nxMin = 0;
                    let nxMax = nxMin + nxRange;
                    if (nxMax > u.data[0].length) nxMax = u.data[0].length;
                    u.batch(() => {
                        uPlot.sync(u.cursor.sync.key).plots.forEach((p) => {
                            p.setScale("x", { min: nxMin, max: nxMax });
                        });
                    });
                },
                { passive: true },
            );
        },
	];

        bind: {

                        if (vid.paused) vid.play(); // play video when plot is clicked
                        };
